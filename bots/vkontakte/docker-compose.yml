services:
  nmvkbot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    command: ["python", "main.py"]
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./shared:/app/shared
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8080/healthz').read()\nPY"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
