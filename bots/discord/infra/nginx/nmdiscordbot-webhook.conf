# NMDiscordBot ingress/webhook reverse proxy
# Локальный reverse-proxy вариант: runtime слушает 127.0.0.1:8080. На BotHost используйте INGRESS_HOST=0.0.0.0 и внешний URL https://nmdiscordbot.bothost.ru/.

limit_req_zone $binary_remote_addr zone=nmdiscordbot_rate:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=nmdiscordbot_conn:10m;

upstream nmdiscordbot_ingress {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 443 ssl http2;
    server_name bot.nevermine.ru;

    ssl_certificate     /etc/letsencrypt/live/bot.nevermine.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot.nevermine.ru/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:NMDiscordBotSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 256k;
    client_body_timeout 10s;
    keepalive_timeout 30s;
    send_timeout 30s;

    access_log /var/log/nginx/nmdiscordbot-access.log;
    error_log  /var/log/nginx/nmdiscordbot-error.log warn;

    # При необходимости включи allowlist.
    # allow 203.0.113.10;
    # deny all;

    location /internal/ {
        limit_req zone=nmdiscordbot_rate burst=20 nodelay;
        limit_conn nmdiscordbot_conn 20;

        proxy_pass http://nmdiscordbot_ingress;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
        proxy_connect_timeout 5s;
        proxy_buffering off;
    }

    location = /healthz {
        proxy_pass http://nmdiscordbot_ingress/internal/health/liveness;
        access_log off;
    }

    location = /readyz {
        proxy_pass http://nmdiscordbot_ingress/internal/health/readiness;
        access_log off;
    }
}
