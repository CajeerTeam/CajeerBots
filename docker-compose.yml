services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cajeerbots}
      POSTGRES_USER: ${POSTGRES_USER:-cajeerbots}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD не задан}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cajeerbots} -d ${POSTGRES_DB:-cajeerbots}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  local:
    build: .
    read_only: true
    user: "cajeer"
    tmpfs:
      - /tmp
      - /app/runtime
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    profiles: ["local"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cajeerbots}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cajeerbots}
      DATABASE_ASYNC_URL: postgresql+asyncpg://${POSTGRES_USER:-cajeerbots}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cajeerbots}
      EVENT_BUS_BACKEND: memory
      CAJEER_BOTS_MODE: local
      CAJEER_BOTS_DEFAULT_TARGET: all
    command: ["cajeer-bots", "run", "all"]
    depends_on:
      postgres:
        condition: service_healthy

  migrate:
    build: .
    read_only: true
    user: "cajeer"
    tmpfs:
      - /tmp
      - /app/runtime
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    profiles: ["migrate", "all"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cajeerbots}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cajeerbots}
      DATABASE_ASYNC_URL: postgresql+asyncpg://${POSTGRES_USER:-cajeerbots}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cajeerbots}
    command: ["cajeer-bots", "db", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    read_only: true
    user: "cajeer"
    tmpfs:
      - /tmp
      - /app/runtime
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    profiles: ["api", "all"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cajeerbots}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cajeerbots}
      DATABASE_ASYNC_URL: postgresql+asyncpg://${POSTGRES_USER:-cajeerbots}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cajeerbots}
      EVENT_BUS_BACKEND: ${EVENT_BUS_BACKEND:-redis}
      REDIS_URL: redis://redis:6379/0
    command: ["cajeer-bots", "run", "api"]
    ports: ["8088:8088"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build: .
    read_only: true
    user: "cajeer"
    tmpfs:
      - /tmp
      - /app/runtime
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    profiles: ["worker", "all"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cajeerbots}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cajeerbots}
      DATABASE_ASYNC_URL: postgresql+asyncpg://${POSTGRES_USER:-cajeerbots}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cajeerbots}
      EVENT_BUS_BACKEND: ${EVENT_BUS_BACKEND:-redis}
      REDIS_URL: redis://redis:6379/0
      LOCAL_INLINE_ROUTING: "false"
    command: ["cajeer-bots", "run", "worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  bridge:
