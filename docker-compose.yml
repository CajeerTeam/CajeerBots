    profiles: ["bridge", "all"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cajeerbots}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cajeerbots}
      DATABASE_ASYNC_URL: postgresql+asyncpg://${POSTGRES_USER:-cajeerbots}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cajeerbots}
      EVENT_BUS_BACKEND: ${EVENT_BUS_BACKEND:-redis}
      REDIS_URL: redis://redis:6379/0
      LOCAL_INLINE_ROUTING: "false"
    command: ["cajeer-bots", "run", "bridge"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  telegram:
