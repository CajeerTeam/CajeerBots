services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cajeerbots}
      POSTGRES_USER: ${POSTGRES_USER:-cajeerbots}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD не задан}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cajeerbots} -d ${POSTGRES_DB:-cajeerbots}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  local:
    build: .
    profiles: ["local"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cajeerbots}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cajeerbots}
      EVENT_BUS_BACKEND: memory
      CAJEER_BOTS_MODE: local
      CAJEER_BOTS_DEFAULT_TARGET: all
    command: ["cajeer-bots", "run", "all"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    profiles: ["api", "all"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cajeerbots}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cajeerbots}
      EVENT_BUS_BACKEND: ${EVENT_BUS_BACKEND:-redis}
      REDIS_URL: redis://redis:6379/0
    command: ["cajeer-bots", "run", "api"]
    ports: ["8088:8088"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    profiles: ["worker", "all"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cajeerbots}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cajeerbots}
      EVENT_BUS_BACKEND: ${EVENT_BUS_BACKEND:-redis}
      REDIS_URL: redis://redis:6379/0
      LOCAL_INLINE_ROUTING: "false"
    command: ["cajeer-bots", "run", "worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bridge:
    build: .
    profiles: ["bridge", "all"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cajeerbots}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cajeerbots}
      EVENT_BUS_BACKEND: ${EVENT_BUS_BACKEND:-redis}
      REDIS_URL: redis://redis:6379/0
      LOCAL_INLINE_ROUTING: "false"
    command: ["cajeer-bots", "run", "bridge"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  telegram:
    build: .
    profiles: ["telegram", "all"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cajeerbots}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cajeerbots}
      EVENT_BUS_BACKEND: ${EVENT_BUS_BACKEND:-redis}
      REDIS_URL: redis://redis:6379/0
      LOCAL_INLINE_ROUTING: "false"
    command: ["cajeer-bots", "run", "telegram"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  discord:
    build: .
    profiles: ["discord", "all"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cajeerbots}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cajeerbots}
      EVENT_BUS_BACKEND: ${EVENT_BUS_BACKEND:-redis}
      REDIS_URL: redis://redis:6379/0
      LOCAL_INLINE_ROUTING: "false"
    command: ["cajeer-bots", "run", "discord"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  vkontakte:
    build: .
    profiles: ["vkontakte", "vk", "all"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cajeerbots}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cajeerbots}
      EVENT_BUS_BACKEND: ${EVENT_BUS_BACKEND:-redis}
      REDIS_URL: redis://redis:6379/0
      LOCAL_INLINE_ROUTING: "false"
    command: ["cajeer-bots", "run", "vkontakte"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
