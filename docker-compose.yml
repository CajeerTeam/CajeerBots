    cap_drop:
      - ALL
    profiles: ["telegram", "all"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cajeerbots}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cajeerbots}
      DATABASE_ASYNC_URL: postgresql+asyncpg://${POSTGRES_USER:-cajeerbots}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cajeerbots}
      EVENT_BUS_BACKEND: ${EVENT_BUS_BACKEND:-redis}
      REDIS_URL: redis://redis:6379/0
      LOCAL_INLINE_ROUTING: "false"
    command: ["cajeer-bots", "run", "telegram"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  discord:
    build: .
    read_only: true
    user: "cajeer"
    tmpfs:
      - /tmp
      - /app/runtime
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    profiles: ["discord", "all"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cajeerbots}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cajeerbots}
      DATABASE_ASYNC_URL: postgresql+asyncpg://${POSTGRES_USER:-cajeerbots}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cajeerbots}
      EVENT_BUS_BACKEND: ${EVENT_BUS_BACKEND:-redis}
      REDIS_URL: redis://redis:6379/0
      LOCAL_INLINE_ROUTING: "false"
    command: ["cajeer-bots", "run", "discord"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  vkontakte:
    build: .
    read_only: true
    user: "cajeer"
    tmpfs:
      - /tmp
      - /app/runtime
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    profiles: ["vkontakte", "vk", "all"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cajeerbots}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cajeerbots}
      DATABASE_ASYNC_URL: postgresql+asyncpg://${POSTGRES_USER:-cajeerbots}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cajeerbots}
      EVENT_BUS_BACKEND: ${EVENT_BUS_BACKEND:-redis}
      REDIS_URL: redis://redis:6379/0
      LOCAL_INLINE_ROUTING: "false"
    command: ["cajeer-bots", "run", "vkontakte"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  fake:
    build: .
    read_only: true
    user: "cajeer"
    tmpfs:
      - /tmp
      - /app/runtime
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    profiles: ["fake", "smoke"]
    env_file: .env
    environment:
      EVENT_BUS_BACKEND: memory
      FAKE_ENABLED: "true"
      FAKE_SCRIPT: "/status|/help"
    command: ["cajeer-bots", "run", "fake"]


  integration-tests:
    build: .
    read_only: true
    user: "cajeer"
    tmpfs:
      - /tmp
      - /app/runtime
    profiles: ["integration"]
    env_file: .env
    environment:
      CAJEER_BOTS_ENV: test
      EVENT_SIGNING_SECRET: integration-secret
      API_TOKEN: integration-token
      API_TOKEN_READONLY: integration-readonly
      API_TOKEN_METRICS: integration-metrics
      DATABASE_URL: postgresql://${POSTGRES_USER:-cajeerbots}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cajeerbots}
      DATABASE_ASYNC_URL: postgresql+asyncpg://${POSTGRES_USER:-cajeerbots}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cajeerbots}
      EVENT_BUS_BACKEND: postgres
      DELIVERY_BACKEND: postgres
      DEAD_LETTER_BACKEND: postgres
      IDEMPOTENCY_BACKEND: postgres
      REDIS_URL: redis://redis:6379/0
    command: ["bash", "-lc", "cajeer-bots db check && python -m pytest -q tests/integration"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:
