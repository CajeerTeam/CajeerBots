name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install -e .[dev]
      - run: python -m core.versioning
      - run: python scripts/check_syntax.py
      - run: python scripts/check_architecture.py
      - run: ./scripts/check_docs.sh
      - run: ./scripts/check_secrets.sh
      - run: find . -type d -name __pycache__ -prune -exec rm -rf {} +
      - run: test -s README.md && test -s .env.example && test -d core && test -d bots
      - run: test ! -d migrations
      - run: |
          if grep -RInE 'Never'""'Mine|cajeer'""'_bots|cajeer'""'_core|nm'""'bot' --exclude-dir=.git --exclude-dir=dist --exclude-dir=runtime --exclude-dir=__pycache__ --exclude-dir=.pytest_cache .; then
            echo "Найдены запрещённые проектные или устаревшие термины"
            exit 1
          fi
      - run: CAJEER_BOTS_ENV=test TELEGRAM_ENABLED=false DISCORD_ENABLED=false VKONTAKTE_ENABLED=false FAKE_ENABLED=true EVENT_SIGNING_SECRET=ci-secret API_TOKEN=ci-token API_TOKEN_READONLY=ci-readonly API_TOKEN_METRICS=ci-metrics python -m core doctor --offline
      - run: python -m core adapters && python -m core modules && python -m core plugins && python -m core commands && python -m core distributed protocol
      - run: python -m pytest -q

  integration:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: docker compose --profile integration up --build --abort-on-container-exit
        env:
          POSTGRES_PASSWORD: integration-password
