name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e .
      - run: python -m compileall -q core bots modules plugins
      - run: test -s README.md && test -s .env.example && test -d core && test -d bots
      - run: EVENT_SIGNING_SECRET=ci-secret python -m core doctor --offline
      - run: python -m core adapters && python -m core modules && python -m core plugins
